services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  go-app:
    build: ./go-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/benchmark?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M

  dotnet-app:
    build: ./dotnet-app
    ports:
      - "8081:8080"
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=benchmark;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      ASPNETCORE_URLS: "http://+:8080"
      # Tell GC to be conservative within the 512MB container limit (0=default, 9=max conservative)
      DOTNET_GCConserveMemory: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M

  dotnet11-app:
    build: ./dotnet11-app
    ports:
      - "8082:8080"
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=benchmark;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      ASPNETCORE_URLS: "http://+:8080"
      DOTNET_GCConserveMemory: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
